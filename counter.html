<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عدّاد الحجوزات</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 16px; }

    .counter-login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 32px var(--shadow);
      text-align: center;
      margin-top: 60px;
    }
    .counter-login-card h2 { color: var(--wine); font-size: 1.4rem; margin-bottom: 8px; }
    .counter-login-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }

    .counter-dashboard { width: 100%; max-width: 700px; margin-top: 32px; }

    .counter-header {
      background: linear-gradient(135deg, var(--wine), var(--mauve));
      color: white;
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      margin-bottom: 24px;
    }
    .counter-header h1 { font-size: 1.3rem; margin-bottom: 4px; opacity: 0.9; }
    .counter-header p { font-size: 0.85rem; opacity: 0.7; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      box-shadow: 0 4px 16px var(--shadow);
    }
    .stat-num { font-size: 2.2rem; font-weight: 800; color: var(--wine); line-height: 1; }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
    .stat-card.money .stat-num { color: #2a7a4b; }

    .bookings-table-wrap {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 16px var(--shadow);
    }
    .bookings-table-wrap h3 { color: var(--wine); font-size: 1rem; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--blush); color: var(--wine); padding: 10px 12px; text-align: right; font-weight: 600; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--blush); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf6f4; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-confirmed { background: #d1fae5; color: #065f46; }
    .badge-pending   { background: #fef3c7; color: #92400e; }

    .logout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      margin-top: 12px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.15); }

    .empty-msg { text-align: center; color: var(--muted); padding: 32px; }

    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-card.money { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-wrap" class="counter-login-card">
    <div style="font-size:2.5rem;margin-bottom:12px;">🌿</div>
    <h2>عدّاد حجوزات لمّة حنة</h2>
    <p>أدخلي كلمة المرور للمتابعة</p>
    <div class="form-group" style="text-align:right;">
      <label for="counter-pass">كلمة المرور</label>
      <input type="password" id="counter-pass" autocomplete="current-password">
    </div>
    <div class="admin-error hidden" id="counter-error">كلمة مرور خاطئة</div>
    <button class="submit-btn" id="counter-login-btn" style="margin-top:16px;">دخول</button>
  </div>

  <!-- Dashboard -->
  <div id="counter-dashboard" class="counter-dashboard hidden">

    <div class="counter-header">
      <h1>🌿 عدّاد حجوزات لمّة حنة</h1>
      <p id="last-updated"></p>
      <button class="logout-btn" id="counter-logout">خروج</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">إجمالي الحجوزات المؤكدة</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-month">—</div>
        <div class="stat-label">حجوزات هذا الشهر</div>
      </div>
      <div class="stat-card money">
        <div class="stat-num" id="stat-money">— JD</div>
        <div class="stat-label">المبلغ المستحق لكِ</div>
      </div>
    </div>

    <div class="bookings-table-wrap">
      <h3>سجل الحجوزات</h3>
      <div id="bookings-body">
        <p class="empty-msg">جارٍ التحميل...</p>
      </div>
    </div>

  </div>

  <script src="js/i18n.js?v=3"></script>
  <script src="js/counter.js?v=1"></script>
</body>
</html>
